{% extends "base.html" %}
{% block title %}Enter Reset Code — TravelBook{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5">
    <div class="card p-4">
      <h5 class="fw-bold mb-1"><i class="bi bi-shield-lock me-2" style="color:var(--primary);"></i>Enter Reset Code</h5>
      <p class="text-muted small mb-4">Check your email for the 6-digit code we sent you.</p>
      <form method="post">
        <input type="hidden" name="email" value="{{ email }}"/>
        <div class="mb-3">
          <label class="form-label">Reset Code</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-123"></i></span>
            <input type="text" name="code" class="form-control" placeholder="123456" maxlength="6" required/>
          </div>
        </div>
        <button type="submit" class="btn btn-primary-custom w-100">Verify Code</button>
        <div class="text-center mt-3">
          <a href="{{ url_for('forgot_password') }}" class="text-muted small">Resend code</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
