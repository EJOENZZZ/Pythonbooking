{% extends "base.html" %}
{% block title %}Verify Email — TravelBook{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5">
    <div class="card p-4">
      <h5 class="fw-bold mb-1"><i class="bi bi-envelope-check me-2" style="color:var(--primary);"></i>Verify Your Email</h5>
      <p class="text-muted small mb-4">We sent a 6-digit code to <strong>{{ email }}</strong>. Enter it below to complete your registration.</p>
      <form method="post">
        <input type="hidden" name="email" value="{{ email }}"/>
        <div class="mb-3">
          <label class="form-label">Verification Code</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-123"></i></span>
            <input type="text" name="code" class="form-control" placeholder="123456" maxlength="6" required/>
          </div>
        </div>
        <button type="submit" class="btn btn-primary-custom w-100">Verify & Create Account</button>
        <div class="text-center mt-3">
          <a href="{{ url_for('signup') }}" class="text-muted small">Back to Sign Up</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
