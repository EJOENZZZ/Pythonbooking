{% extends "base.html" %}
{% block title %}Search Tickets - TravelBook{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="card p-4">
      <h4 class="fw-bold mb-4 text-center">Book Your Trip</h4>

      <!-- Tabs -->
      <ul class="nav nav-pills mb-4 justify-content-center" id="tripTab">
        <li class="nav-item">
          <button class="nav-link active px-4" id="plane-tab" onclick="setType('plane')">✈️ Plane</button>
        </li>
        <li class="nav-item">
          <button class="nav-link px-4" id="ferry-tab" onclick="setType('ferry')">⛴️ Ferry</button>
        </li>
      </ul>

      <form action="{{ url_for('search') }}" method="get">
        <input type="hidden" name="type" id="trip_type" value="plane"/>
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label fw-semibold">From</label>
            <select name="from" class="form-select" required>
              <option value="">-- Select Origin --</option>
              {% for o in origins %}
                <option value="{{ o }}">{{ o }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">To</label>
            <select name="to" class="form-select" required>
              <option value="">-- Select Destination --</option>
              {% for d in destinations %}
                <option value="{{ d }}">{{ d }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">Date</label>
            <input type="date" name="date" class="form-control" required/>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">Passengers</label>
            <input type="number" name="passengers" class="form-control" value="1" min="1" max="10" required/>
          </div>
          <div class="col-12 mt-2">
            <button type="submit" class="btn btn-book w-100 py-2 fw-bold fs-5">Search</button>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
  function setType(type) {
    document.getElementById('trip_type').value = type;
    document.getElementById('plane-tab').classList.toggle('active', type === 'plane');
    document.getElementById('ferry-tab').classList.toggle('active', type === 'ferry');
  }
</script>
{% endblock %}
