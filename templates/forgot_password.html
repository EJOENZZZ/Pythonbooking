{% extends "base.html" %}
{% block title %}Forgot Password — TravelBook{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5">
    <div class="card p-4">
      <h5 class="fw-bold mb-1"><i class="bi bi-key me-2" style="color:var(--primary);"></i>Forgot Password</h5>
      <p class="text-muted small mb-4">Enter your email and we'll send you a reset code.</p>
      <form method="post">
        <div class="mb-3">
          <label class="form-label">Email Address</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input type="email" name="email" class="form-control" placeholder="juan@email.com" required/>
          </div>
        </div>
        <button type="submit" class="btn btn-primary-custom w-100">Send Reset Code</button>
        <div class="text-center mt-3">
          <a href="{{ url_for('login') }}" class="text-muted small">Back to Login</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
