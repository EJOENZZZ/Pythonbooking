{% extends "base.html" %}
{% block title %}Login - TravelBook{% endblock %}
{% block content %}
<div class="auth-card card p-4">
  <div class="text-center mb-4">
    <h3 class="fw-bold">Welcome Back ✈️</h3>
    <p class="text-muted">Log in to manage your bookings</p>
  </div>
  <form method="post">
    <div class="mb-3">
      <label class="form-label fw-semibold">Email Address</label>
      <input type="email" name="email" class="form-control" placeholder="juan@email.com" required/>
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold">Password</label>
      <input type="password" name="password" class="form-control" placeholder="••••••••" required/>
    </div>
    <button type="submit" class="btn btn-book w-100 py-2 fw-bold mt-2">Log In</button>
  </form>
  <hr/>
  <p class="text-center mb-0 text-muted">
    Don't have an account? <a href="{{ url_for('signup') }}" class="text-danger fw-semibold">Sign Up</a>
  </p>
</div>
{% endblock %}
