{% extends "base.html" %}
{% block title %}Log In — TravelBook{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-box">
    <div class="text-center mb-4">
      <div class="auth-logo-wrap auth-logo-red"><i class="bi bi-airplane-fill" style="color:var(--primary);font-size:1.6rem;"></i></div>
      <h2 class="auth-heading">Welcome back</h2>
      <p class="auth-sub mt-1">Log in to your account</p>
    </div>

    <!-- Login Type Tabs -->
    <div class="d-flex mb-4 rounded overflow-hidden border">
      <button onclick="setRole('user')" id="tab-user"
        class="btn w-50 py-2 fw-bold"
        style="border-radius:0;background:var(--primary);color:#fff;border:none;">
        <i class="bi bi-person-fill me-1"></i>User
      </button>
      <button onclick="setRole('admin')" id="tab-admin"
        class="btn w-50 py-2 fw-bold"
        style="border-radius:0;background:#f1f5f9;color:#64748b;border:none;">
        <i class="bi bi-shield-lock-fill me-1"></i>Admin
      </button>
    </div>

    <form method="post">
      <input type="hidden" name="role" id="role-input" value="user"/>
      <div class="mb-3">
        <label class="form-label">Email / Username</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-envelope"></i></span>
          <input type="text" name="email" class="form-control" placeholder="juan@email.com" required/>
        </div>
      </div>
      <div class="mb-4">
        <div class="d-flex justify-content-between align-items-center">
          <label class="form-label">Password</label>
          <a href="{{ url_for('forgot_password') }}" id="forgot-link" style="font-size:.82rem;color:var(--primary);">Forgot password?</a>
        </div>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" name="password" class="form-control" placeholder="••••••••" required/>
        </div>
      </div>
      <button type="submit" class="btn btn-primary-custom w-100 py-2 fw-bold">
        <i class="bi bi-box-arrow-in-right me-2"></i>Log In
      </button>
    </form>
    <div class="divider">or</div>
    <p class="text-center mb-0" style="font-size:.9rem;color:var(--muted);">
      Don't have an account?
      <a href="{{ url_for('signup') }}" style="color:var(--primary);font-weight:700;">Create one free →</a>
    </p>
  </div>
</div>
<script>
function setRole(role) {
  document.getElementById('role-input').value = role;
  const userTab    = document.getElementById('tab-user');
  const adminTab   = document.getElementById('tab-admin');
  const forgotLink = document.getElementById('forgot-link');
  if (role === 'user') {
    userTab.style.background  = 'var(--primary)';
    userTab.style.color       = '#fff';
    adminTab.style.background = '#f1f5f9';
    adminTab.style.color      = '#64748b';
    forgotLink.style.display  = '';
  } else {
    adminTab.style.background = 'var(--navy)';
    adminTab.style.color      = '#fff';
    userTab.style.background  = '#f1f5f9';
    userTab.style.color       = '#64748b';
    forgotLink.style.display  = 'none';
  }
}
</script>
{% endblock %}
