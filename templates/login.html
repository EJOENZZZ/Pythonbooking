{% extends "base.html" %}
{% block title %}Log In — TravelBook{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-box">
    <div class="text-center mb-4">
      <div class="auth-logo-wrap auth-logo-red"><i class="bi bi-airplane-fill" style="color:var(--primary);font-size:1.6rem;"></i></div>
      <h2 class="auth-heading">Welcome back</h2>
      <p class="auth-sub mt-1">Log in to manage your bookings</p>
    </div>
    <form method="post">
      <div class="mb-3">
        <label class="form-label">Email / Username</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-envelope"></i></span>
          <input type="text" name="email" class="form-control" placeholder="juan@email.com" required/>
        </div>
      </div>
      <div class="mb-4">
        <div class="d-flex justify-content-between align-items-center">
          <label class="form-label">Password</label>
          <a href="{{ url_for('forgot_password') }}" style="font-size:.82rem;color:var(--primary);">Forgot password?</a>
        </div>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" name="password" class="form-control" placeholder="••••••••" required/>
        </div>
      </div>
      <button type="submit" class="btn btn-primary-custom w-100 py-2 fw-bold">
        <i class="bi bi-box-arrow-in-right me-2"></i>Log In
      </button>
    </form>
    <div class="divider">or</div>
    <p class="text-center mb-0" style="font-size:.9rem;color:var(--muted);">
      Don't have an account?
      <a href="{{ url_for('signup') }}" style="color:var(--primary);font-weight:700;">Create one free →</a>
    </p>
  </div>
</div>
{% endblock %}
