{% extends "base.html" %}
{% block title %}Reset Password — TravelBook{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5">
    <div class="card p-4">
      <h5 class="fw-bold mb-1"><i class="bi bi-lock me-2" style="color:var(--primary);"></i>Set New Password</h5>
      <p class="text-muted small mb-4">Choose a new password for your account.</p>
      <form method="post">
        <div class="mb-3">
          <label class="form-label">New Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" name="password" class="form-control" placeholder="New password" required/>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label">Confirm Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
            <input type="password" name="confirm" class="form-control" placeholder="Confirm password" required/>
          </div>
        </div>
        <button type="submit" class="btn btn-primary-custom w-100">Update Password</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
