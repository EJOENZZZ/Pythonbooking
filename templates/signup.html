{% extends "base.html" %}
{% block title %}Sign Up - TravelBook{% endblock %}
{% block content %}
<div class="auth-card card p-4">
  <div class="text-center mb-4">
    <h3 class="fw-bold">Create Account ⛴️</h3>
    <p class="text-muted">Book planes and ferries in seconds</p>
  </div>
  <form method="post">
    <div class="mb-3">
      <label class="form-label fw-semibold">Full Name</label>
      <input type="text" name="full_name" class="form-control" placeholder="Juan Dela Cruz" required/>
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold">Email Address</label>
      <input type="email" name="email" class="form-control" placeholder="juan@email.com" required/>
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold">Password</label>
      <input type="password" name="password" class="form-control" placeholder="••••••••" minlength="6" required/>
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold">Confirm Password</label>
      <input type="password" name="confirm" class="form-control" placeholder="••••••••" minlength="6" required/>
    </div>
    <button type="submit" class="btn btn-book w-100 py-2 fw-bold mt-2">Create Account</button>
  </form>
  <hr/>
  <p class="text-center mb-0 text-muted">
    Already have an account? <a href="{{ url_for('login') }}" class="text-danger fw-semibold">Log In</a>
  </p>
</div>
{% endblock %}
