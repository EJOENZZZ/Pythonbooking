{% extends "base.html" %}
{% block title %}Sign Up — TravelBook{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-box">
    <div class="text-center mb-4">
      <div class="auth-logo-wrap auth-logo-blue mx-auto"><i class="bi bi-person-plus-fill" style="color:var(--blue);font-size:1.5rem;"></i></div>
      <h2 class="auth-heading">Create account</h2>
      <p class="auth-sub mt-1">Book planes and ferries in seconds</p>
    </div>
    <form method="post">
      <div class="mb-3">
        <label class="form-label">Full Name</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" name="full_name" class="form-control" placeholder="Juan Dela Cruz" required/>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Email Address</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-envelope"></i></span>
          <input type="email" name="email" class="form-control" placeholder="juan@email.com" required/>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Phone Number</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-phone"></i></span>
          <input type="tel" name="phone" class="form-control" placeholder="+63 9XX XXX XXXX" required/>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" name="password" class="form-control" placeholder="Min. 6 characters" minlength="6" required/>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label">Confirm Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
          <input type="password" name="confirm" class="form-control" placeholder="Repeat password" minlength="6" required/>
        </div>
      </div>
      <button type="submit" class="btn btn-primary-custom w-100 py-2 fw-bold">
        <i class="bi bi-envelope-check me-2"></i>Send Verification Code
      </button>
    </form>
    <div class="divider">or</div>
    <p class="text-center mb-0" style="font-size:.9rem;color:var(--muted);">
      Already have an account?
      <a href="{{ url_for('login') }}" style="color:var(--primary);font-weight:700;">Log in →</a>
    </p>
  </div>
</div>
{% endblock %}
