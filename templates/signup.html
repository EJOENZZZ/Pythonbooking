{% extends "base.html" %}
{% block title %}Sign Up - TravelBook{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-card card">
    <div class="text-center mb-4">
      <div class="auth-icon">⛴️</div>
      <h3 class="auth-title">Create Account</h3>
      <p class="text-muted">Book planes and ferries in seconds</p>
    </div>
    <form method="post">
      <div class="mb-3">
        <label class="form-label">Full Name</label>
        <div class="input-group">
          <span class="input-group-text bg-white"><i class="bi bi-person text-muted"></i></span>
          <input type="text" name="full_name" class="form-control border-start-0" placeholder="Juan Dela Cruz" required/>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Email Address</label>
        <div class="input-group">
          <span class="input-group-text bg-white"><i class="bi bi-envelope text-muted"></i></span>
          <input type="email" name="email" class="form-control border-start-0" placeholder="juan@email.com" required/>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <div class="input-group">
          <span class="input-group-text bg-white"><i class="bi bi-lock text-muted"></i></span>
          <input type="password" name="password" class="form-control border-start-0" placeholder="Min. 6 characters" minlength="6" required/>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label">Confirm Password</label>
        <div class="input-group">
          <span class="input-group-text bg-white"><i class="bi bi-lock-fill text-muted"></i></span>
          <input type="password" name="confirm" class="form-control border-start-0" placeholder="Repeat password" minlength="6" required/>
        </div>
      </div>
      <button type="submit" class="btn btn-book w-100 py-2 fw-bold fs-6">
        <i class="bi bi-person-plus me-2"></i>Create Account
      </button>
    </form>
    <div class="auth-divider">or</div>
    <p class="text-center mb-0 text-muted small">
      Already have an account?
      <a href="{{ url_for('login') }}" class="fw-semibold" style="color:var(--primary);">Log in here</a>
    </p>
  </div>
</div>
{% endblock %}
